# 서버 포트
server.port=8080

# ★ 카카오 JavaScript 앱키 — 여기에 발급받은 키를 입력하세요
kakao.map.appkey=502b99c57514360a34fdf5b9181ed284

# ★ 카카오 REST API 키 — 카카오 개발자 콘솔에서 발급 (지도 검색용)
kakao.map.restkey=03a041000c72178b476cbb6e29431e81

# Thymeleaf 설정
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# H2 데이터베이스 설정 (개발용)
spring.datasource.url=jdbc:h2:mem:weddingdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 콘솔 활성화 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA 설정
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 파일 업로드 크기 제한 (메인 사진 Base64 고려)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
